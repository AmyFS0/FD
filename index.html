<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Feliz Día del Padre!</title>
    <style>
        body {
            background-color: #e3f2fd; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 400px;
        }

        h1 { color: #d32f2f; text-shadow: 2px 2px 4px white; }
        p { font-weight: bold; text-shadow: 1px 1px 3px white; }

        .imagen-papa {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 5px solid white;
            margin-bottom: 20px;
        }

        /* CONTENEDOR DEL CORAZÓN Y EL TEXTO INTERNO */
        #wrapper-corazon {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            pointer-events: none;
            opacity: 0;
        }

        #corazon-svg {
            color: #ff1744;
            font-size: 250px; /* Tamaño base grande */
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.2));
        }

        /* MENSAJE DENTRO DEL CORAZÓN */
        #mensaje-interno {
            position: absolute;
            color: white;
            font-size: 40px;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            text-align: center;
            width: 100%;
            opacity: 0; /* Oculto al inicio */
            transition: opacity 0.5s ease;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        button {
            background-color: #d32f2f;
            color: white;
            border: 4px solid white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            z-index: 110;
            position: relative;
            width: 100%;
            max-width: 280px;
            transition: all 0.3s;
            font-weight: bold;
        }

        button.desactivado {
            background-color: #9e9e9e;
            opacity: 0.5;
            cursor: default;
        }
    </style>
</head>
<body>

    <div id="wrapper-corazon">
        <div id="corazon-svg">❤</div>
        <div id="mensaje-interno">I love<br>youuu</div>
    </div>

    <div class="container">
        <h1>¡Feliz Día del Padre!</h1>
        <p>¡Te quiero muchísimo, papá!</p>
        <img class="imagen-papa" src="pdh.png" alt="Papá e hija">
        <br>
        <button id="boton-amor" onclick="crecerAmor()">¡Haz crecer mi amor! ❤</button>
    </div>

    <script>
        let escala = 0.3;
        const limiteEscala = 2.5; // Ajusta esto para que tape lo que quieras
        const incremento = 0.4;

        function crecerAmor() {
            const wrapper = document.getElementById('wrapper-corazon');
            const mensaje = document.getElementById('mensaje-interno');
            const boton = document.getElementById('boton-amor');

            // Aparece al primer click
            wrapper.style.opacity = "1";

            if (escala < limiteEscala) {
                escala += incremento;
                wrapper.style.transform = `translate(-50%, -50%) scale(${escala})`;
            }

            // Si llegamos al tope
            if (escala >= limiteEscala) {
                mensaje.style.opacity = "1"; // Aparece el texto adentro
                boton.innerHTML = "¡Feliz día! ❤️"; // Cambia el texto del botón
                boton.classList.add('desactivado');
                boton.onclick = null;
            }
        }
    </script>
</body>
</html>
