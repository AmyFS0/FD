<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Feliz Día del Padre, Papá!</title>
    <style>
        body {
            background-color: #e3f2fd; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            z-index: 10; /* Texto e imagen detrás del corazón gigante */
            width: 100%;
            max-width: 400px;
            position: relative; 
            box-sizing: border-box;
        }

        h1 {
            color: #d32f2f;
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            position: relative;
        }

        p {
            font-size: 1.2rem;
            color: #333;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
            position: relative;
        }

        .imagen-papa {
            width: 100%;
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 5px solid white;
            position: relative;
        }

        /* EL CORAZÓN GIGANTE AHORA ESTÁ ENFRENTE */
        #corazon-fondo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1); /* Escala inicial */
            color: #ff1744;
            font-size: 150px; /* Tamaño de fuente base */
            z-index: 100; /* ¡FRENTE A TODO! */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Animación elástica */
            user-select: none;
            pointer-events: none; /* No interfiere con los clics en el botón */
            filter: drop-shadow(0 0 20px rgba(255, 23, 68, 0.4));
        }

        button {
            background-color: #d32f2f;
            color: white;
            border: 4px solid white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-weight: bold;
            position: relative;
            z-index: 110; /* Botón por encima del corazón para poder hacer clic */
            width: 100%;
            max-width: 280px;
        }

        button:active { transform: scale(0.9); }
        
        /* Estilo para el botón cuando llega al límite */
        button.finalizado {
            background-color: #4caf50; /* Cambia a verde */
            border-color: #a5d6a7;
            cursor: default;
            box-shadow: none;
        }

        .corazon-pispileo {
            position: fixed;
            color: #ff8a80;
            font-size: 20px;
            z-index: 2;
            animation: pispileo var(--duracion) infinite ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes pispileo {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.3); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            #corazon-fondo { font-size: 120px; } /* Tamaño base menor en móvil */
        }
    </style>
</head>
<body>

    <div id="corazon-fondo">❤</div>

    <div class="container">
        <h1>¡Feliz Día del Padre!</h1>
        <p>¡Te quiero muchísimo, papá!</p>
        
        <img class="imagen-papa" src="pdh.png" alt="Papá e hija">
        
        <br>
        <button id="boton-amor" onclick="crecerAmor()">¡Haz click aqui! ❤</button>
    </div>

    <script>
        // Configuración del crecimiento
        let currentScale = 1;
        const maxScale = 3.5; // Límite de crecimiento (350% del tamaño inicial)
        const crecimientoPorClick = 0.5; // Cuánto crece en cada clic

        const corazonFondo = document.getElementById('corazon-fondo');
        const botonAmor = document.getElementById('boton-amor');

        function iniciarCorazones() {
            for (let i = 0; i < 30; i++) {
                const cora = document.createElement('div');
                cora.innerHTML = "❤";
                cora.className = 'corazon-pispileo';
                cora.style.left = Math.random() * 100 + "vw";
                cora.style.top = Math.random() * 100 + "vh";
                cora.style.setProperty('--duracion', (Math.random() * 2 + 1) + "s");
                document.body.appendChild(cora);
            }
        }

        function crecerAmor() {
            // Verificamos si ya alcanzamos el límite
            if (currentScale >= maxScale) {
                return; // No hace nada más
            }

            // Incrementamos la escala
            currentScale += crecimientoPorClick;
            
            // Aplicamos la nueva escala con la transformación
            corazonFondo.style.transform = `translate(-50%, -50%) scale(${currentScale})`;

            // Si alcanzamos o superamos el límite, mostramos el mensaje final
            if (currentScale >= maxScale) {
                finalizarCrecimiento();
            }
        }

        function finalizarCrecimiento() {
            // Cambiamos el texto del botón
            botonAmor.innerHTML = "I love youu ❤️";
            // Añadimos la clase para cambiar el estilo (a verde)
            botonAmor.classList.add('finalizado');
            // Deshabilitamos el botón
            botonAmor.onclick = null;
            
            // Opcional: Pequeño efecto visual final en el corazón
            corazonFondo.style.filter = "drop-shadow(0 0 30px rgba(255, 23, 68, 0.8))";
        }

        window.onload = iniciarCorazones;
    </script>
</body>
</html>
