<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Feliz Día del Padre, Papá!</title>
    <style>
        body {
            background-color: #e3f2fd; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            position: relative; 
        }

        h1 { color: #d32f2f; font-size: 2.2rem; margin-bottom: 10px; text-shadow: 2px 2px 4px white; }
        p { font-size: 1.2rem; color: #333; font-weight: bold; margin-bottom: 20px; text-shadow: 1px 1px 3px white; }

        .imagen-papa {
            width: 100%;
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 5px solid white;
        }

        #corazon-fondo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0); 
            color: #ff1744;
            font-size: 150px;
            z-index: 100; 
            transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            user-select: none;
            pointer-events: none;
            opacity: 0;
        }

        button {
            background-color: #d32f2f;
            color: white;
            border: 4px solid white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-weight: bold;
            position: relative;
            z-index: 110;
            width: 100%;
            max-width: 280px;
            transition: all 0.3s;
        }

        button.finalizado {
            background-color: #4caf50 !important;
            transform: scale(1.1);
        }

        .corazon-pispileo {
            position: fixed;
            color: #ff8a80;
            font-size: 20px;
            z-index: 2;
            animation: pispileo 2s infinite ease-in-out;
            opacity: 0.5;
        }

        @keyframes pispileo { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="corazon-fondo">❤</div>

    <div class="container">
        <h1>¡Feliz Día del Padre!</h1>
        <p>¡Te quiero muchísimo, papá!</p>
        <img class="imagen-papa" src="pdh.png" alt="Papá e hija">
        <br>
        <button id="boton-amor" onclick="crecerAmor()">¡Haz crecer mi amor! ❤</button>
    </div>

    <script>
        let escalaActual = 0.5;
        const limite = 3.0; // Bajamos el límite para que salga más fácil
        const incremento = 0.4; // Crece más rápido

        function crecerAmor() {
            const corazon = document.getElementById('corazon-fondo');
            const boton = document.getElementById('boton-amor');

            // Mostrar el corazón al primer click
            corazon.style.opacity = "1";

            if (escalaActual < limite) {
                escalaActual += incremento;
                corazon.style.transform = `translate(-50%, -50%) scale(${escalaActual})`;
            }

            // Si llegamos al límite
            if (escalaActual >= limite) {
                boton.innerHTML = "I love youu ❤️";
                boton.classList.add('finalizado');
                boton.onclick = null; // Desactiva más clicks
            }
        }
    </script>
</body>
</html>
