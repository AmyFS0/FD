<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Feliz Día del Padre!</title>
    <style>
        body {
            background-color: #e3f2fd; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h1 { color: #d32f2f; text-shadow: 2px 2px 4px white; margin-bottom: 10px; }
        p { font-weight: bold; text-shadow: 1px 1px 3px white; margin-bottom: 20px; }

        .imagen-papa {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 5px solid white;
            margin-bottom: 20px;
        }

        /* CORAZONES FLOTANTES DEL FONDO */
        .corazon-pispileo {
            position: fixed;
            color: #ff8a80;
            font-size: 20px;
            z-index: 1; /* Al fondo de todo */
            animation: pispileo var(--duracion) infinite ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes pispileo {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* CORAZÓN GIGANTE CON MENSAJE */
        #wrapper-corazon {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            pointer-events: none;
            opacity: 0;
        }

        #corazon-svg {
            color: #ff1744;
            font-size: 280px; /* Un poco más grande para que quepa bien el texto */
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.2));
        }

        #mensaje-interno {
            position: absolute;
            color: white;
            font-size: 35px;
            font-weight: bold;
            text-align: center;
            width: 80%;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        button {
            background-color: #d32f2f;
            color: white;
            border: 4px solid white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            z-index: 110;
            position: relative;
            width: 100%;
            max-width: 280px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button.desactivado {
            background-color: #4caf50;
            border-color: #a5d6a7;
            cursor: default;
        }
    </style>
</head>
<body>

    <div id="wrapper-corazon">
        <div id="corazon-svg">❤</div>
        <div id="mensaje-interno">I love<br>youuu</div>
    </div>

    <div class="container">
        <h1>¡Feliz Día del Padre!</h1>
        <p>¡Te quiero muchísimo, papá!</p>
        <img class="imagen-papa" src="pdh.png" alt="Papá e hija">
        <br>
        <button id="boton-amor" onclick="crecerAmor()">¡Haz crecer mi amor! ❤</button>
    </div>

    <script>
        let escala = 0.3;
        const limiteEscala = 2.3; 
        const incremento = 0.4;
        let primerClick = true;

        // Función para crear los corazoncitos de fondo
        function crearCorazonesFondo() {
            const cantidad = 25;
            for (let i = 0; i < cantidad; i++) {
                const cora = document.createElement('div');
                cora.innerHTML = "❤";
                cora.className = 'corazon-pispileo';
                cora.style.left = Math.random() * 100 + "vw";
                cora.style.top = Math.random() * 100 + "vh";
                cora.style.setProperty('--duracion', (Math.random() * 2 + 1) + "s");
                document.body.appendChild(cora);
            }
        }

        function crecerAmor() {
            const wrapper = document.getElementById('wrapper-corazon');
            const mensaje = document.getElementById('mensaje-interno');
            const boton = document.getElementById('boton-amor');

            if (primerClick) {
                wrapper.style.opacity = "1";
                primerClick = false;
            }

            if (escala < limiteEscala) {
                escala += incremento;
                wrapper.style.transform = `translate(-50%, -50%) scale(${escala})`;
            }

            if (escala >= limiteEscala) {
                mensaje.style.opacity = "1";
                boton.innerHTML = "¡Feliz día! ❤️";
                boton.classList.add('desactivado');
                boton.onclick = null;
            }
        }

        // Ejecutar la creación de corazones al cargar la página
        window.onload = crearCorazonesFondo;
    </script>
</body>
</html>
